<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOGFIGHT — Screen Preview (dev only)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <!-- shared production UI styles (single source of truth) -->
    <link rel="stylesheet" href="/styles/game-ui.css" />
    <style>
      /* preview-only: faux 3D-scene backdrop so the HUD reads against something */
      #preview-scene {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background:
          radial-gradient(120% 80% at 50% 120%, rgba(51, 153, 255, 0.10) 0%, transparent 55%),
          linear-gradient(180deg, #0a1626 0%, #070b12 60%, #050810 100%);
      }
      #preview-scene::after {
        content: '';
        position: absolute; left: 0; right: 0; top: 58%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(102, 204, 255, 0.35), transparent);
        box-shadow: 0 0 20px rgba(51, 153, 255, 0.3);
      }
    </style>
  </head>
  <body class="state-boot">
    <div id="preview-scene"></div>

    <!-- atmosphere -->
    <div id="fx-vignette"></div>
    <div id="fx-scanlines"></div>

    <!-- in-game HUD (revealed once the match starts) -->
    <div id="hud-root">
      <header id="hud-topbar">
        <div class="brand">DOGFIGHT</div>
        <nav class="topnav">
          <span class="active">STATUS</span>
          <span>COMBAT</span>
          <span>SENSORS</span>
        </nav>
        <div class="topright">
          <span class="status-dot"></span>
          <span>PILOT <span class="callsign" id="player-id">...</span></span>
          <span>·</span>
          <span>24MS</span>
        </div>
      </header>

      <!-- COMBAT SCORE -->
      <div id="hud-score">
        <div class="score-item"><span class="score-label">KILLS</span><span id="score-kills" class="score-num">00</span></div>
        <div class="score-sep"></div>
        <div class="score-item"><span class="score-label">DEATHS</span><span id="score-deaths" class="score-num">00</span></div>
        <div class="score-sep"></div>
        <div class="score-item"><span class="score-label">SCORE</span><span id="score-value" class="score-num accent">0</span></div>
      </div>

      <!-- VITALS -->
      <section id="hud-vitals" class="hud-panel">
        <span class="bracket tl"></span><span class="bracket tr"></span>
        <span class="bracket bl"></span><span class="bracket br"></span>
        <div class="module-head">
          <span class="module-title">VITALS</span>
          <span id="health-pct">100%</span>
        </div>
        <div class="health-track">
          <span id="health-text">100/100</span>
          <div id="health-fill"></div>
        </div>
        <div class="telemetry">
          <div>
            <div class="micro-label">SPD (KTS)</div>
            <div class="val"><span id="speed">0</span></div>
          </div>
          <div>
            <div class="micro-label">ALT (M)</div>
            <div class="val" id="altitude">0</div>
          </div>
        </div>
        <div class="pos-line">
          <div class="micro-label">POSITION</div>
          <div id="position">[0.0, 0.0, 0.0]</div>
        </div>
      </section>

      <!-- WEAPON -->
      <section id="hud-weapon" class="hud-panel">
        <span class="bracket tl"></span><span class="bracket tr"></span>
        <span class="bracket bl"></span><span class="bracket br"></span>
        <div class="module-head">
          <span class="module-title">WEAPON</span>
          <span id="weapon-status">READY</span>
        </div>
        <div class="micro-label">AMMUNITION</div>
        <div id="ammo-count">30/30</div>
        <div id="reload-status" style="display: none;">
          <div class="micro-label">RELOADING <span id="reload-progress">0.0s</span></div>
          <div class="reload-track"><div id="reload-bar"></div></div>
        </div>
        <div class="weapon-foot">SHOTS <span id="shots-fired">0</span></div>
      </section>

      <!-- DIAGNOSTICS -->
      <aside id="debug" class="hud-panel">
        <span class="bracket tl"></span><span class="bracket tr"></span>
        <span class="bracket bl"></span><span class="bracket br"></span>
        <div class="module-title" style="font-size: 11px;">INPUT</div>
        <div class="diag-keys">
          <span id="input-w" class="input-status input-inactive">W</span>
          <span id="input-up" class="input-status input-inactive">▲</span>
          <span id="input-s" class="input-status input-inactive">S</span>
          <span id="input-down" class="input-status input-inactive">▼</span>
          <span id="input-a" class="input-status input-inactive">A</span>
          <span id="input-left" class="input-status input-inactive">◀</span>
          <span id="input-d" class="input-status input-inactive">D</span>
          <span id="input-right" class="input-status input-inactive">▶</span>
        </div>
        <div class="diag-line"><span>EVENTS SENT</span><span id="events-sent">0</span></div>
        <div class="diag-line"><span>LAST EVENT</span><span id="last-event">NONE</span></div>
      </aside>

      <!-- CENTER RETICLE -->
      <div id="crosshair">
        <div class="ret-ring"></div>
        <div class="ret-line t"></div>
        <div class="ret-line b"></div>
        <div class="ret-line l"></div>
        <div class="ret-line r"></div>
        <div class="ret-dot"></div>
      </div>
    </div>

    <script type="module" src="/preview.ts"></script>
  </body>
</html>
