<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Space+Mono&amp;family=Public+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: "#070B12",
                            panel: "#0C1320",
                            raised: "#111A2B",
                            primary: "#3399FF",
                            bright: "#66CCFF",
                            neutral: "#E6F1FF",
                            secondary: "#8FA9C8",
                            muted: "#5A7290",
                            success: "#4CAF50",
                            warning: "#FFC107",
                            danger: "#F44336"
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        headline: ["Space Grotesk", "sans-serif"],
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["Space Grotesk", "sans-serif"],
                        mono: ["Space Mono", "monospace"],
                        label: ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #070B12;
            overflow: hidden;
            margin: 0;
            color: #E6F1FF;
        }

        .perspective-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(to right, rgba(51, 153, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 153, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            z-index: 1;
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(7, 11, 18, 0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05),
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(51, 153, 255, 0.6), 0 0 30px rgba(51, 153, 255, 0.3);
        }

        .glow-button {
            box-shadow: 0 0 15px rgba(51, 153, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-button:hover {
            box-shadow: 0 0 25px rgba(51, 153, 255, 0.6);
            transform: translateY(-2px);
            background-color: #66CCFF;
        }

        .corner-bracket {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(51, 153, 255, 0.4);
            z-index: 20;
        }

        .corner-tl { top: 32px; left: 32px; border-right: none; border-bottom: none; }
        .corner-tr { top: 32px; right: 32px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 32px; left: 32px; border-right: none; border-top: none; }
        .corner-br { bottom: 32px; right: 32px; border-left: none; border-top: none; }

        @keyframes flicker {
            0% { opacity: 0.8; }
            5% { opacity: 0.9; }
            10% { opacity: 0.8; }
            15% { opacity: 1; }
            20% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .hud-flicker {
            animation: flicker 4s infinite;
        }
    </style>
</head>
<body class="font-body selection:bg-brand-primary selection:text-brand-bg">
<!-- Background Layers -->
<div class="perspective-grid"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<!-- HUD Brackets -->
<div class="corner-bracket corner-tl"></div>
<div class="corner-bracket corner-tr"></div>

<!-- Top App Bar (Shared Component Style) -->

</div>
<!-- Decorative Telemetry -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-full max-w-2xl px-8 flex justify-between items-end opacity-40 select-none">
<div class="flex flex-col gap-1 items-start text-[10px] font-mono">
<div class="flex gap-2">

</div>

</div>
<div class="flex flex-col gap-1 items-end text-[10px] font-mono">

</main>
<!-- Footer (Shared Component Style) -->
<footer class="fixed bottom-0 w-full flex justify-between items-center px-10 py-6 z-50 text-[10px] font-mono tracking-widest text-brand-muted uppercase">
<div class="flex items-center gap-6">
<span class="text-brand-primary font-bold">VER 2.4.0_STABLE</span>
<div class="flex gap-4">
<a class="hover:text-brand-secondary transition-colors" href="#">지원</a>

<a class="hover:text-brand-secondary transition-colors" href="#">패치 노트</a>
</div>
</div>
<div class="text-right">
            © 2024 DOGFIGHT SYSTEMS. ALL RIGHTS RESERVED.
        </div>
</footer>
<!-- Interactive Layer -->

            const grid = document.querySelector('.perspective-grid');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            grid.style.transform = `perspective(500px) rotateX(${60 + y}deg) rotateY(${x}deg) translateZ(0)`;
        });

        // Simulating some HUD logic
        const updateTelemetry = () => {

            });

        setInterval(updateTelemetry, 100);
    </script>
</body></html>
